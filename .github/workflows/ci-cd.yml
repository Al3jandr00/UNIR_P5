name: CI/CD — Test, Build, Push Docker Hub, Deploy Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/task-manager-api

jobs:
  # ── Job 1: Tests ──────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v
        env:
          AI_ALLOW_LOCAL_FALLBACK: "true"
          DB_URL: "sqlite:///:memory:"

  # ── Job 2: Build y push a Docker Hub ─────────────────────────────────────
  docker-build-push:
    name: Build and push to Docker Hub
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ── Job 3: Deploy en Azure Container Apps ────────────────────────────────
  azure-deploy:
    name: Deploy to Azure Container Apps
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name task-manager-api \
            --resource-group rg-taskmanager \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verify deployment
        run: |
          az containerapp show \
            --name task-manager-api \
            --resource-group rg-taskmanager \
            --query "properties.latestRevisionName" \
            --output tsv
